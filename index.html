<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Jessi ❤️</title>

<style>

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at center, #34205f, #05000f);
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
}


/* Fondo de estrellas */
body::before {
    content: "";
    position: absolute;
    width: 300%;
    height: 300%;
    background-image:
    radial-gradient(white 2px, transparent 3px),
    radial-gradient(white 1px, transparent 2px),
    radial-gradient(#ffffff 1.5px, transparent 2.5px);

    background-size:
    120px 120px,
    70px 70px,
    180px 180px;

    animation: movimiento 30s linear infinite;
    opacity: 0.8;
}


@keyframes movimiento {

    from {
        transform: translateY(0);
    }

    to {
        transform: translateY(-200px);
    }

}


/* Carta */

.carta {

    position: relative;
    width: 80%;
    max-width: 350px;

    padding: 30px;

    background: rgba(255,255,255,0.12);

    border-radius: 25px;

    text-align: center;

    backdrop-filter: blur(10px);

    box-shadow: 0 0 40px rgba(255,255,255,0.4);

}


h1 {

    font-size: 30px;

}


p {

    font-size: 18px;

    line-height: 1.5;

}


button {

    margin-top: 20px;

    padding: 15px 35px;

    border: none;

    border-radius: 50px;

    background: #ff6fae;

    color: white;

    font-size: 18px;

}

</style>

</head>


<body>


<div class="carta">

<h1>
🌌 Tienes una carta 💌
</h1>


<p>
Sé que llevamos solamente dos meses, pero han sido momentos muy especiales para mí ❤️
</p>


<button>
Ábreme 💗
</button>


</div>


</body>
</html>
