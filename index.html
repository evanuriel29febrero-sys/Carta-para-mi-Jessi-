<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Jessi ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at center, #302060, #050014);
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
}

..estrellas {
  position: absolute;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle, white 2px, transparent 3px),
    radial-gradient(circle, white 1px, transparent 2px),
    radial-gradient(circle, #ffffff 1.5px, transparent 2.5px);
  background-size: 120px 120px, 80px 80px, 200px 200px;
  background-position: 10px 20px, 40px 60px, 90px 30px;
  animation: mover 30s linear infinite;
  opacity: 0.8;
}
