<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Jessi ❤️</title>

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(circle at top, #332060, #080018 70%);
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
}


/* Estrellas */
.estrellas {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(white 2px, transparent 3px),
    radial-gradient(#ffffff 1px, transparent 2px),
    radial-gradient(#ffffff 1.5px, transparent 2.5px);
  background-size:
    140px 140px,
    90px 90px,
    200px 200px;
  background-position:
    20px 30px,
    50px 70px,
    100px 20px;
  animation: estrellas 25s linear infinite;
}


@keyframes estrellas {
  from {
    transform: translateY(0);
  }

  to {
    transform: translateY(-150px);
  }
}


/* Carta */
.carta {
  position: relative;
  width: 85%;
  max-width: 380px;
  padding: 35px 25px;
  text-align: center;

  background: rgba(255,255,255,0.12);
  border-radius: 25px;

  backdrop-filter: blur(8px);

  box-shadow:
    0 0 25px rgba(255,255,255,0.4);
}


h1 {
  font-size: 30px;
  margin-bottom: 20px;
}


p {
  font-size: 18px;
  line-height: 1.5;
}


button {

  margin-top: 25px;

  padding: 15px 35px;

  border: none;
  border-radius: 50px;

  background: #ff6fae;

  color: white;

  font-size: 18px;

}

</style>

</head>


<body>

<div class="estrellas"></div>


<div class="carta">

<h1>
🌌 Tienes una carta 💌
</h1>


<p>
Sé que hay algo que quiero decirte...
</p>


<button>
Ábreme ❤️
</button>


</div>


</body>
</html>
