<!DOCTYPE html>
<html>
<head>
<title>Mi Jessi ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #25255f, #050014);
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 50px 50px;
  animation: estrellas 20s linear infinite;
  opacity: 0.5;
}

@keyframes estrellas {
  from {
    transform: translateY(0);
  }
  to {
    transform: translateY(-200px);
  }
}

.carta {
  position: relative;
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 0 30px #ffffff55;
}

button {
  background: #ff6fae;
  color: white;
  border: none;
  padding: 15px 30px;
  border-radius: 30px;
  font-size: 18px;
}

</style>
</head>

<body>

<div class="carta">
<h1>🌌 Tienes una carta 💌</h1>

<p>
Hay algo que quiero decirte...
</p>

<button>
Ábreme ❤️
</button>

</div>

</body>
</html>
