<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Jessi ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at center, #302060, #050014);
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
}

.estrellas {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 35px 35px;
  animation: mover 25s linear infinite;
  opacity: 0.6;
}

@keyframes mover {
  from {
    transform: translateY(0);
  }
  to {
    transform: translateY(-150px);
  }
}

.carta {
  position: relative;
  width: 80%;
  max-width: 350px;
  padding: 30px;
  text-align: center;
  background: rgba(255,255,255,0.12);
  border-radius: 25px;
  backdrop-filter: blur(5px);
  box-shadow: 0 0 40px rgba(255,255,255,0.3);
}

h1 {
  font-size: 28px;
}

p {
  font-size: 18px;
}

button {
  margin-top: 20px;
  padding: 15px 30px;
  border: none;
  border-radius: 50px;
  background: #ff6fae;
  color: white;
  font-size: 18px;
}
</style>

</head>

<body>

<div class="estrellas"></div>

<div class="carta">
<h1>🌌 Tienes una carta 💌</h1>

<p>
Hay algo que quiero decirte...
</p>

<button>
Ábreme ❤️
</button>

</div>

</body>
</html>
